<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-image: url('photos/elephants.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .signup-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 1px solid #ffffff;
            padding-bottom: 10px;
        }
        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .input-group {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .input-group label {
            width: 120px;
            margin-right: 10px;
            font-size: 14px;
        }
        .input-container {
            position: relative;
            flex: 1;
        }
        .input-container i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #cccccc;
            font-size: 16px;
        }
        .input-container input,
        .input-container select {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box;
        }
        .input-container input::placeholder {
            color: #cccccc;
        }
        .input-container select {
            padding-left: 12px;
        }
        .input-container select option {
            background: #000000;
            color: #ffffff;
        }
        .upload-group {
            margin-bottom: 20px;
        }
        .upload-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .upload-group input[type="file"] {
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            width: 100%;
            box-sizing: border-box;
        }
        .create-account-btn {
            width: 100%;
            padding: 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .create-account-btn:hover {
            background-color: #0056b3;
        }
        @media (max-width: 768px) {
            .row {
                flex-direction: column;
                gap: 10px;
            }
            .input-group label {
                width: 100%;
                margin-bottom: 5px;
                margin-right: 0;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div id="message" style="display: none; padding: 10px; margin-bottom: 20px; border-radius: 5px;"></div>
        <form id="signupForm">
            <div class="section">
                <h2>Personal Details</h2>
                <div class="row">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <div class="input-container">
                            <i class="fas fa-user"></i>
                            <input type="text" id="username" name="username" placeholder="Enter your username" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <div class="input-container">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="input-group">
                        <label for="first_name">First Name</label>
                        <div class="input-container">
                            <i class="fas fa-user"></i>
                            <input type="text" id="first_name" name="first_name" placeholder="Enter your first name">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="last_name">Last Name</label>
                        <div class="input-container">
                            <i class="fas fa-user"></i>
                            <input type="text" id="last_name" name="last_name" placeholder="Enter your last name">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="input-group">
                        <label for="phone">Phone Number</label>
                        <div class="input-container">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="role">Account Type</label>
                        <div class="input-container">
                            <select id="role" name="role" required>
                                <option value="">Select Account Type</option>
                                <option value="buyer">Buyer</option>
                                <option value="seller">Seller</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="input-group">
                        <label for="address">Address</label>
                        <div class="input-container">
                            <i class="fas fa-map-marker-alt"></i>
                            <input type="text" id="address" name="address" placeholder="Enter your address">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="city">City</label>
                        <div class="input-container">
                            <i class="fas fa-city"></i>
                            <input type="text" id="city" name="city" placeholder="Enter your city">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="input-group">
                        <label for="state">State</label>
                        <div class="input-container">
                            <i class="fas fa-map"></i>
                            <input type="text" id="state" name="state" placeholder="Enter your state">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="zip_code">ZIP Code</label>
                        <div class="input-container">
                            <i class="fas fa-mailbox"></i>
                            <input type="text" id="zip_code" name="zip_code" placeholder="Enter your ZIP code">
                        </div>
                    </div>
                </div>
            </div>
            <div class="section">
                <h2>Security</h2>
                <div class="row">
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-container">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="confirm_password">Confirm Password</label>
                        <div class="input-container">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                        </div>
                    </div>
                </div>
            </div>
            <button type="submit" class="create-account-btn" id="submitBtn">Create Account</button>
        </form>
        <div style="text-align: center; margin-top: 20px;">
            <p>Already have an account? <a href="/login" style="color: #007BFF;">Login here</a></p>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password !== confirmPassword) {
                showMessage('Passwords do not match!', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters long!', 'error');
                return;
            }

            // Collect form data
            const formData = new FormData(signupForm);
            const userData = {
                username: formData.get('username'),
                email: formData.get('email'),
                password: formData.get('password'),
                role: formData.get('role'),
                first_name: formData.get('first_name'),
                last_name: formData.get('last_name'),
                phone: formData.get('phone'),
                address: formData.get('address'),
                city: formData.get('city'),
                state: formData.get('state'),
                zip_code: formData.get('zip_code')
            };

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Account created successfully! Redirecting to login...', 'success');
                    // Store token in localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Redirect to appropriate dashboard based on role
                    setTimeout(() => {
                        if (data.user.role === 'seller') {
                            window.location.href = '/seller-dashboard';
                        } else {
                            window.location.href = '/buyer-dashboard';
                        }
                    }, 2000);
                } else {
                    showMessage(data.error || 'Registration failed!', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });

        function showMessage(message, type) {
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';
            messageDiv.style.backgroundColor = type === 'error' ? '#dc3545' : '#28a745';
            messageDiv.style.color = 'white';
            messageDiv.style.border = `1px solid ${type === 'error' ? '#b02a37' : '#1e7e34'}`;
        }
    </script>
</body>
</html>
